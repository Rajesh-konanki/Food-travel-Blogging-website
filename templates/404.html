{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<section class="error-page">
    <img
        src="https://images.unsplash.com/photo-1594322436404-5a0526db4d13?w=600"
        alt="Page not found illustration"
        class="error-image"
        loading="lazy"
        onerror="this.src='{{ config.DEFAULT_COVER }}'"
    >
    <h1>404 - Page Not Found</h1>
    <p>The page you requested does not exist.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Back Home</a>
</section>
{% endblock %}
